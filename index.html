<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f5f1" />
    <meta http-equiv="refresh" content="1; url=./web/" />
    <title>InternSpace · Model Lineage</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #17251f; background: #f3f5f1; }
      main { width: min(680px, 100%); padding: 32px; border: 1px solid #ccd5cf; border-radius: 18px; background: #fff; box-shadow: 0 14px 42px rgba(35, 56, 46, .09); }
      h1 { margin: 0 0 12px; font-size: clamp(28px, 5vw, 42px); }
      p { line-height: 1.7; }
      .label { display: inline-block; margin-bottom: 14px; padding: 4px 10px; border-radius: 999px; color: #704d05; background: #fff0bd; font-weight: 700; letter-spacing: .03em; }
      .action { display: inline-block; margin-top: 10px; padding: 11px 18px; border-radius: 10px; color: #fff; background: #176b4b; font-weight: 700; text-decoration: none; }
      .action:focus-visible { outline: 3px solid #8fc9b2; outline-offset: 3px; }
      small { display: block; margin-top: 14px; color: #5b6862; }
    </style>
  </head>
  <body>
    <main>
      <span class="label">Issue-driven model database</span>
      <h1>InternSpace Model Lineage</h1>
      <p>
        主画布以 Architecture Proposal Issue 为模型节点，使用 Parent issue 构成谱系。
        Pull Request、W&B、commit 与代码位置都保留在对应模型详情中。
      </p>
      <p>
        InternSpace 原有 Feature 仅作为根模型的辅助档案，不再与模型 Issue 叠成第二张图。
      </p>
      <a class="action" href="./web/">进入模型谱系</a>
      <small>页面将在 1 秒后自动进入；如果没有跳转，请使用上方链接。</small>
    </main>
  </body>
</html>
